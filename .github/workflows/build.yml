name: Build App

permissions:
  contents: write

on:
  push:
    branches: [ "*" ]
  workflow_dispatch:

jobs:

  build-mac:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: 21

      - name: Build DMG
        run: |
          jpackage \
          --input out/artifacts/grupp2_system_jar \
          --dest builds \
          --name MarsTravelsBooking \
          --app-version 1.0.0 \
          --main-jar grupp2_system.jar \
          --main-class com.example.grupp2_system.App.Launcher \
          --type dmg

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: mac-build
          path: builds/*.dmg

      - name: Create Release (Mac)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: MarsTravelsBooking build ${{ github.run_number }}
          files: builds/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: 21

      - name: Build EXE
        shell: cmd
        run: |
          jpackage ^
          --input out/artifacts/grupp2_system_jar ^
          --dest builds ^
          --name MarsTravelsBooking ^
          --app-version 1.0.0 ^
          --main-jar grupp2_system.jar ^
          --main-class com.example.grupp2_system.App.Launcher ^
          --type exe ^
          --icon icons/icon.ico

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: builds/*.exe

      - name: Create Release (Windows)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          files: builds/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}