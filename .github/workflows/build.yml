name: Build App

permissions:
  contents: write

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:

  build-mac:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: 21

      - name: Build JAR
        run: ./mvnw clean package

      - name: Find JAR
        id: jar
        run: |
          JAR=$(ls target/*.jar | head -n 1)
          echo "jar=$JAR" >> $GITHUB_OUTPUT

      - name: Build DMG
        run: |
          jpackage \
          --input target \
          --dest builds \
          --name MarsTravelsBooking \
          --app-version 1.0.0 \
          --main-jar $(basename "${{ steps.jar.outputs.jar }}") \
          --main-class com.example.grupp2_system.App.Launcher \
          --type dmg \
          --icon icons/icon.icns

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: mac-build
          path: builds/*.dmg

      - name: Create Release (Mac)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: MarsTravelsBooking v1.0.${{ github.run_number }}
          files: builds/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: 21

      - name: Build JAR
        run: mvnw.cmd clean package

      - name: Find JAR
        id: jar
        shell: bash
        run: |
          JAR=$(ls target/*.jar | head -n 1)
          echo "jar=$JAR" >> $GITHUB_OUTPUT

      - name: Build EXE
        shell: bash
        run: |
          jpackage \
          --input target \
          --dest builds \
          --name MarsTravelsBooking \
          --app-version 1.0.0 \
          --main-jar $(basename "${{ steps.jar.outputs.jar }}") \
          --main-class com.example.grupp2_system.App.Launcher \
          --type exe \
          --icon icons/icon.ico \
          --win-menu \
          --win-shortcut \
          --win-dir-chooser

      - name: Build MSI
        shell: bash
        run: |
          jpackage \
          --input target \
          --dest builds \
          --name MarsTravelsBooking \
          --app-version 1.0.0 \
          --main-jar $(basename "${{ steps.jar.outputs.jar }}") \
          --main-class com.example.grupp2_system.App.Launcher \
          --type msi \
          --icon icons/icon.ico \
          --win-menu \
          --win-shortcut \
          --win-dir-chooser

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: builds/*

      - name: Create Release (Windows)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          files: builds/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}