name: Build App

permissions:
  contents: write

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:

  build-mac:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Create builds folder
        run: rm -rf builds && mkdir builds

      - name: Build JAR
        run: |
          chmod +x mvnw
          ./mvnw clean package

      - name: Build DMG
        run: |
          JAR=$(ls target/*.jar | grep -v "original" | head -n 1)
          JAR_NAME=$(basename "$JAR")

          jpackage \
            --input target \
            --dest builds \
            --name MarsTravelsBooking \
            --app-version 1.0.0 \
            --main-jar "$JAR_NAME" \
            --main-class com.example.grupp2_system.App.Launcher \
            --type dmg \
            --icon icons/icon.icns

          xattr -cr builds

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: mac-build
          path: builds/*.dmg

      - name: Copy JAR to builds
        run: |
          JAR=$(ls target/*.jar | grep -v "original" | head -n 1)
          cp "$JAR" builds/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: MarsTravelsBooking v1.0.${{ github.run_number }}
          files: builds/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}